services:
  postgres:
    image: postgres:16
    env_file: .env
    environment:
      POSTGRES_DB: bnc
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d bnc"]
      interval: 10s
      timeout: 5s
      retries: 5

  bnc-app:
    build:
      context: ./project/Bnc
    env_file: .env
    volumes:
      - resources:/app/resources
    depends_on:
      postgres:
        condition: service_healthy

  admin-app:
    build:
      context: ./project/Admin
    env_file: .env
    volumes:
      - resources:/app/resources
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - resources:/app/resources
    depends_on:
      - bnc-app
      - admin-app

volumes:
  postgres_data:
  resources:
